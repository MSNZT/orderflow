name: CD
on:
  push:
    branches:
      - main
jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }} 

  deploy:
    name: Deploy production
    needs: publish-image
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: orderflow-production
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" \
            > "$HOME/.ssh/orderflow_deploy"
          chmod 600 "$HOME/.ssh/orderflow_deploy"
          printf '%s\n' "$SSH_KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
      - name: Deploy image to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
          ORDERFLOW_IMAGE: ghcr.io/msnzt/orderflow:sha-${{ github.sha }}
        run: |
          set -Eeuo pipefail
          ssh \
            -i "$HOME/.ssh/orderflow_deploy" \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            bash -s -- \
              "$DEPLOY_SHA" \
              "$ORDERFLOW_IMAGE" \
              "$DEPLOY_PATH" <<'REMOTE'
          set -Eeuo pipefail
          DEPLOY_SHA="$1"
          ORDERFLOW_IMAGE="$2"
          DEPLOY_PATH="$3"
          test -n "$DEPLOY_SHA"
          test -n "$ORDERFLOW_IMAGE"
          test -n "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          echo "Deploying commit: $DEPLOY_SHA"
          echo "Deploying image:  $ORDERFLOW_IMAGE"
          git fetch --prune origin main
          git switch main
          git reset --hard "$DEPLOY_SHA"
          printf 'ORDERFLOW_IMAGE=%s\n' "$ORDERFLOW_IMAGE" \
            > .env.deploy
          make -f Makefile.prod deploy
          REMOTE