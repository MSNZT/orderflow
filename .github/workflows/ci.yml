name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TEST_POSTGRES_DSN: postgres://orderflow:orderflow@localhost:5432/orderflow?sslmode=disable

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_USER: orderflow
          POSTGRES_PASSWORD: orderflow
          POSTGRES_DB: orderflow

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U orderflow -d orderflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          set -Eeuo pipefail

          unformatted_files="$(gofmt -l .)"

          if [ -n "$unformatted_files" ]; then
            echo "The following files are not formatted:"
            printf '%s\n' "$unformatted_files"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Apply database migrations
        run: |
          docker run --rm \
            --network host \
            -v "$GITHUB_WORKSPACE/migrations:/migrations:ro" \
            migrate/migrate:v4.19.1 \
            -path=/migrations \
            -database "$TEST_POSTGRES_DSN" \
            up

      - name: Run tests
        run: go test -count=1 ./...

      - name: Build API
        run: go build -o /tmp/orderflow-api ./cmd/api