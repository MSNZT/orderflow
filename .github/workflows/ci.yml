name: CI
on:
  push:
    branches:
      - main
      - chore/ci
  pull_request:
    branches:
      - main
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check go version
        run: go version
      - name: Inspect repository
        run: |
          pwd
          ls -la
          git log -1 --oneline
      - name: Print message
        run: echo "OrderFlow CI is running"
