http:
  addr: ":8080"
  read_timeout: 10s
  read_header_timeout: 5s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 30s

postgres:
  dsn: "postgres://orderflow:orderflow@localhost:5432/orderflow?sslmode=disable"
  max_conns: 10
  min_conns: 0
  max_conn_lifetime: 30m

jwt:
  secret: "secret-jwt-change-me"
  access_ttl: 15m